{% extends "base.html" %}
{% block title %}Neuer Benutzer – {{ app_name }}{% endblock %}
{% block content %}
<div class="breadcrumb">
    <a href="{{ url_for('admin_nutzer') }}">Benutzer</a>
    <span class="sep">›</span>
    <span>Neuer Benutzer</span>
</div>
<div class="page-header">
    <h1>➕ Neuer Benutzer</h1>
</div>
<div class="card">
    <form method="POST">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div class="form-row">
            <div class="form-group">
                <label class="form-label">Benutzername *</label>
                <input type="text" name="benutzername" class="form-control" required>
            </div>
            <div class="form-group">
                <label class="form-label">Passwort *</label>
                <input type="password" name="passwort" class="form-control" required minlength="4">
            </div>
            <div class="form-group">
                <label class="form-label">Rolle</label>
                <select name="rolle" class="form-control">
                    <option value="nutzer">Nutzer</option>
                    <option value="admin">Administrator</option>
                </select>
            </div>
        </div>
        <div class="btn-group">
            <button type="submit" class="btn btn-primary">💾 Erstellen</button>
            <a href="{{ url_for('admin_nutzer') }}" class="btn btn-outline">Abbrechen</a>
        </div>
    </form>
</div>
{% endblock %}
