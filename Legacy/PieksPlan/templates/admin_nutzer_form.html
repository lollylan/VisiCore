{% extends "base.html" %}
{% block title %}Neuer Benutzer - PieksPlan{% endblock %}

{% block content %}
<div class="breadcrumb">
    <a href="{{ url_for('admin_nutzer') }}">Nutzerverwaltung</a>
    <span>/</span>
    <strong>Neuer Benutzer</strong>
</div>

<div class="card" style="max-width: 600px;">
    <h2 class="card-title" style="margin-bottom: var(--space-lg);">Neuen Benutzer anlegen</h2>

    <form method="POST">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

        <div class="form-group">
            <label class="form-label" for="benutzername">Benutzername *</label>
            <input type="text" id="benutzername" name="benutzername" class="form-input" required
                placeholder="z.B. mfa_mueller">
        </div>

        <div class="form-group">
            <label class="form-label" for="passwort">Passwort *</label>
            <input type="password" id="passwort" name="passwort" class="form-input" required
                placeholder="Sicheres Passwort">
        </div>

        <div class="form-group">
            <label class="form-label" for="rolle">Rolle</label>
            <select id="rolle" name="rolle" class="form-select">
                <option value="nutzer">Nutzer (kann Daten bearbeiten)</option>
                <option value="admin">Admin (kann auch Nutzer verwalten)</option>
            </select>
        </div>

        <div class="btn-group">
            <button type="submit" class="btn btn-primary">Benutzer anlegen</button>
            <a href="{{ url_for('admin_nutzer') }}" class="btn btn-outline-dark">Abbrechen</a>
        </div>
    </form>
</div>
{% endblock %}
